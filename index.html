<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Music Player</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg,#141e30,#243b55);
  font-family: Arial;
}

.player {
  width: 350px;
  background: #111;
  padding: 20px;
  border-radius: 20px;
  text-align: center;
  color: white;
  box-shadow: 0 0 20px rgba(0,0,0,0.6);
}

h2 { margin: 10px 0 5px; }
h4 { margin: 0; color: #aaa; }

.controls button {
  margin: 10px;
  padding: 10px 15px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  background: #00c853;
  color: white;
  font-size: 16px;
}

.controls button:hover {
  background: #00e676;
}

input[type=range] {
  width: 100%;
  margin-top: 10px;
}

.playlist {
  margin-top: 15px;
  text-align: left;
}

.song {
  padding: 8px;
  background: #222;
  margin: 5px 0;
  border-radius: 8px;
  cursor: pointer;
}

.song.active {
  background: #00c853;
}
</style>
</head>

<body>

<div class="player">

<h2 id="title">Song Title</h2>
<h4 id="artist">Artist</h4>

<audio id="audio"></audio>

<input type="range" id="progress" value="0">

<div class="controls">
  <button onclick="prevSong()">⏮</button>
  <button onclick="playPause()">▶️ / ⏸️</button>
  <button onclick="nextSong()">⏭</button>
</div>

Volume:
<input type="range" id="volume" min="0" max="1" step="0.1">

<div class="playlist" id="playlist"></div>

</div>

<script>

const songs = [
  {
    title: "Dreams",
    artist: "Relax Music",
    src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3"
  },
  {
    title: "Energy Boost",
    artist: "DJ Flow",
    src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-5.mp3"
  },
  {
    title: "Peaceful Mind",
    artist: "Calm Beats",
    src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-6.mp3"
  }
];

let index = 0;

const audio = document.getElementById("audio");
const title = document.getElementById("title");
const artist = document.getElementById("artist");
const progress = document.getElementById("progress");
const volume = document.getElementById("volume");
const playlist = document.getElementById("playlist");

// Load song
function loadSong(i){
  audio.src = songs[i].src;
  title.innerText = songs[i].title;
  artist.innerText = songs[i].artist;
  highlight();
}

// Play / Pause
function playPause(){
  if(audio.paused){
    audio.play();
  } else {
    audio.pause();
  }
}

// Next / Prev
function nextSong(){
  index = (index + 1) % songs.length;
  loadSong(index);
  audio.play();
}

function prevSong(){
  index = (index - 1 + songs.length) % songs.length;
  loadSong(index);
  audio.play();
}

// Progress bar
audio.addEventListener("timeupdate", ()=>{
  progress.value = (audio.currentTime / audio.duration) * 100 || 0;
});

// Seek
progress.addEventListener("input", ()=>{
  audio.currentTime = (progress.value / 100) * audio.duration;
});

// Volume
volume.addEventListener("input", ()=>{
  audio.volume = volume.value;
});

// Autoplay next
audio.addEventListener("ended", nextSong);

// Playlist
songs.forEach((s,i)=>{
  let div = document.createElement("div");
  div.classList.add("song");
  div.innerText = s.title + " - " + s.artist;

  div.onclick = ()=>{
    index = i;
    loadSong(index);
    audio.play();
  };

  playlist.appendChild(div);
});

// Highlight current song
function highlight(){
  document.querySelectorAll(".song").forEach((el, i)=>{
    el.classList.toggle("active", i === index);
  });
}

// Init
loadSong(index);

</script>

</body>
</html>
