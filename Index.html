<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Music Player</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(to right, #0f172a, #020617);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.player {
    width: 350px;
    background: #1e293b;
    border-radius: 20px;
    padding: 20px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

img {
    width: 100%;
    border-radius: 15px;
}

h2 {
    margin: 10px 0 5px;
}

p {
    margin: 0;
    font-size: 14px;
    color: #94a3b8;
}

.controls {
    margin: 15px 0;
}

button {
    background: #38bdf8;
    border: none;
    padding: 10px 15px;
    margin: 5px;
    border-radius: 50%;
    cursor: pointer;
}

input[type="range"] {
    width: 100%;
}

</style>
</head>

<body>

<div class="player">
    <img id="cover" src="cover1.jpg" alt="cover">
    <h2 id="title">Song 1</h2>
    <p id="artist">Artist 1</p>

    <audio id="audio" src="song1.mp3"></audio>

    <input type="range" id="progress" value="0">

    <div class="controls">
        <button onclick="prevSong()">⏮</button>
        <button onclick="playSong()">▶</button>
        <button onclick="pauseSong()">⏸</button>
        <button onclick="nextSong()">⏭</button>
    </div>
</div>

<script>
let songs = [
    "01 Hamari Adhuri Kahani (Title Song) Arijit Singh 190Kbps - Copy.mp3",
    "song2.mp3",
    "song3.mp3"
];

let covers = [
    "cover1.jpg",
    "cover2.jpg",
    "cover3.jpg"
];

let titles = [
    "Song 1",
    "Song 2",
    "Song 3"
];

let artists = [
    "Artist 1",
    "Artist 2",
    "Artist 3"
];

let index = 0;
let audio = document.getElementById("audio");
let title = document.getElementById("title");
let artist = document.getElementById("artist");
let cover = document.getElementById("cover");
let progress = document.getElementById("progress");

function loadSong(i) {
    audio.src = songs[i];
    title.innerText = titles[i];
    artist.innerText = artists[i];
    cover.src = covers[i];
}

function playSong() {
    audio.play();
}

function pauseSong() {
    audio.pause();
}

function nextSong() {
    index = (index + 1) % songs.length;
    loadSong(index);
    playSong();
}

function prevSong() {
    index = (index - 1 + songs.length) % songs.length;
    loadSong(index);
    playSong();
}

audio.addEventListener("timeupdate", () => {
    progress.value = (audio.currentTime / audio.duration) * 100;
});

progress.addEventListener("input", () => {
    audio.currentTime = (progress.value / 100) * audio.duration;
});

</script>

</body>
</html>
